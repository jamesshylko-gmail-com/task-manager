spring:
  application:
    name: taskmanager
  datasource:
    url: jdbc:h2:mem:taskManager;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE;MODE=PostgreSQL;
    driverClassName: org.h2.Driver
    username: admin
    password: admin
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
  sql:
    init:
      data-locations: classpath:db/data.sql
  h2:
    console:
      enabled: true
      path: /h2
      settings.trace: false
      settings.web-allow-others: true
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
jwt:
  header: Authorization
  expiration: 86400000
